<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>SHEIN — Delivery Feedback</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Inter',system-ui,sans-serif;background:#0d1f1a;min-height:100%;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;}
.sheet{width:100%;max-width:480px;background:#f3fff8;border-radius:20px 20px 0 0;max-height:94vh;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;box-shadow:0 -2px 40px rgba(0,0,0,.28);animation:slideUp .36s cubic-bezier(.32,1,.36,1) both;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:none;opacity:1;}}
.sheet-inner{padding:0 20px 36px;}
.handle{width:36px;height:4px;border-radius:99px;background:#c8e8d8;margin:14px auto 20px;}
/* White pill behind logo so black text is always clear */
.logo-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;background:#ffffff;border-radius:12px;padding:12px 14px;border:1px solid #c8f0e4;}
.logo{font-family:'Inter',sans-serif;font-weight:800;font-size:22px;letter-spacing:4px;color:#000000;text-transform:uppercase;}
.logo-tagline{font-size:11px;color:#aaa;font-weight:500;}
.ctx-banner{display:flex;align-items:center;gap:12px;background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:18px;border:1px solid #c8f0e4;}
.ctx-icon{font-size:21px;flex-shrink:0;}
.ctx-text{font-size:12px;color:#888;line-height:1.5;}
.ctx-text strong{color:#1a1a2e;font-size:13px;font-weight:700;display:block;margin-bottom:1px;}
.card{background:#fff;border-radius:14px;padding:20px 16px;border:1px solid #d0f0e4;margin-bottom:12px;}
.tp-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;margin-bottom:12px;background:#e8f8f2;color:#0a7a50;letter-spacing:.2px;}
.survey-title{font-size:18px;font-weight:800;color:#1a1a2e;line-height:1.3;margin-bottom:3px;}
.survey-sub{font-size:12px;color:#bbb;margin-bottom:16px;font-weight:500;}
.nps-q{font-size:13px;font-weight:600;color:#222;margin-bottom:10px;padding:12px 13px;background:#fafafa;border-radius:10px;border:1px solid #f0f0f0;line-height:1.55;}
.nps-hint{font-size:10px;color:#bbb;display:block;margin-top:4px;font-weight:400;}
.nps-label-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.nps-lbl{font-size:10px;color:#bbb;font-weight:500;}
.nps-scores{display:flex;gap:4px;margin-bottom:18px;}
.sc-btn{flex:1;height:42px;border-radius:8px;border:1.5px solid #f0f0f0;background:#fafafa;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;color:#bbb;transition:transform .13s cubic-bezier(.34,1.56,.64,1),background .13s,color .13s;padding:0;touch-action:manipulation;}
.sc-btn:active{transform:scale(.92);}
.sc-btn.sel{transform:scale(1.1) translateY(-2px);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(0,0,0,.13);}
.divider{height:1px;background:#e8f5ef;margin:14px 0 12px;}
.section-label{font-size:10px;color:#bbb;margin-bottom:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.qtag-section{margin-bottom:12px;animation:panelIn .26s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes panelIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
.qtag-wrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px;}
.qtag{padding:7px 12px;border-radius:99px;border:1.5px solid #f0f0f0;background:#fafafa;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;color:#555;transition:all .13s cubic-bezier(.34,1.56,.64,1);user-select:none;touch-action:manipulation;line-height:1.3;}
.qtag:active{transform:scale(.94);}
.qtag:hover{border-color:#06d6a0;color:#06d6a0;}
.qtag.sel{background:#06d6a0;border-color:#06d6a0;color:#fff;transform:scale(1.04);}
.qtag.sel-green{background:#06d6a0!important;border-color:#06d6a0!important;color:#fff!important;}
.qtag.sel-amber{background:#f59e0b!important;border-color:#f59e0b!important;color:#fff!important;}
.qtag.sel-red{background:#ef4444!important;border-color:#ef4444!important;color:#fff!important;}
.tag-hint{font-size:10px;color:#b0d0c0;margin-bottom:7px;font-style:italic;}
.comment-box{width:100%;min-height:72px;padding:11px 13px;border:1.5px solid #f0f0f0;border-radius:12px;font-size:13px;font-family:'Inter',sans-serif;color:#1a1a2e;background:#fafafa;resize:none;line-height:1.6;transition:border-color .16s;margin-bottom:4px;}
.comment-box:focus{outline:none;border-color:#06d6a0;background:#fff;}
.comment-box::placeholder{color:#ccc;}
.char-count{font-size:10px;color:#ddd;text-align:right;margin-bottom:16px;}
.submit-btn{width:100%;height:48px;border-radius:12px;border:none;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:.2px;transition:all .18s cubic-bezier(.34,1.56,.64,1);opacity:.3;pointer-events:none;background:linear-gradient(135deg,#06d6a0,#118ab2);touch-action:manipulation;}
.submit-btn.ready{opacity:1;pointer-events:auto;}
.submit-btn.ready:active{transform:scale(.97);}
.submit-btn.loading{opacity:.55;pointer-events:none;}
.done-screen{display:none;text-align:center;padding:32px 8px 12px;}
.done-screen.active{display:block;animation:panelIn .38s cubic-bezier(.34,1.56,.64,1) both;}
.done-icon{font-size:56px;animation:tpop .58s cubic-bezier(.34,1.56,.64,1) both;margin-bottom:14px;}
@keyframes tpop{from{transform:scale(0) rotate(-10deg);opacity:0;}to{transform:none;opacity:1;}}
.done-title{font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:8px;}
.done-sub{font-size:13px;color:#888;line-height:1.65;margin-bottom:22px;}
.reward-card{background:linear-gradient(135deg,#e8fff4,#e8f8ff);border:1.5px solid #06d6a0;border-radius:14px;padding:18px 20px;margin-bottom:8px;text-align:left;}
.reward-label{font-size:10px;font-weight:700;color:#0a7a50;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.reward-msg{font-size:14px;font-weight:700;color:#1a1a2e;line-height:1.55;}
.reward-note{font-size:11px;color:#aaa;margin-top:7px;font-weight:500;}
.conf-wrap{position:fixed;top:0;left:0;width:100%;height:220px;pointer-events:none;z-index:998;overflow:hidden;}
.cpc{position:absolute;width:7px;height:7px;top:-10px;animation:cfall linear forwards;}
@keyframes cfall{to{transform:translateY(240px) rotate(600deg);opacity:0;}}
</style>
</head>
<body>
<div class="conf-wrap" id="confWrap"></div>
<div class="sheet">
  <div class="handle"></div>
  <div class="logo-bar">
    <div class="logo">SH<span>EI</span>N</div>
    <div class="logo-tagline">Update</div>
  </div>

  <div class="done-screen" style="display: block;">
    <div class="done-icon">🔒</div>
    <div class="done-title">Survey Closed</div>
    <div class="done-sub">
      Thank you for your interest! This feedback form is no longer accepting responses. 
      We appreciate your support.
    </div>
    
    <div class="reward-pill" style="border-color: #bbb; background: #f0f0f0;">
      <div class="reward-code" style="color: #888; letter-spacing: normal; font-size: 16px;">
        Session Expired
      </div>
    </div>
  </div>
</div>

<script>
  // All previous survey logic removed as the form is closed.
  console.log("Survey is inactive.");
</script>
  
</body>
</html>
